    baseUri: https://openapi.tidal.com
    description: TIDAL Commerce API — Stripe and Square Connections business capability. Self-contained, no shared references.
    resources:
    - name: squareConnections
      path: /squareConnections
      operations:
      - name: postsquareconnections
        method: POST
        description: Create single squareConnection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: countryCode
          in: query
          type: string
          description: ISO 3166-1 alpha-2 country code
          required: false
        - name: body
          in: body
          type: object
          description: JSON:API document request body.
          required: true
    - name: squareConnections-id
      path: /squareConnections/{id}
      operations:
      - name: getsquareconnections
        method: GET
        description: Get single squareConnection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Square connection id. Use `me` for the authenticated user's resource
          required: true
    - name: stripeConnections
      path: /stripeConnections
      operations:
      - name: getstripeconnections
        method: GET
        description: Get multiple stripeConnections.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
        - name: filter[owners.id]
          in: query
          type: array
          description: User id. Use `me` for the authenticated user
          required: false
      - name: poststripeconnections
        method: POST
        description: Create single stripeConnection.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: countryCode
          in: query
          type: string
          description: ISO 3166-1 alpha-2 country code
          required: false
        - name: body
          in: body
          type: object
          description: JSON:API document request body.
          required: true
    - name: stripeConnections-id-relationships-owners
      path: /stripeConnections/{id}/relationships/owners
      operations:
      - name: getstripeconnections
        method: GET
        description: Get owners relationship ("to-many").
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
