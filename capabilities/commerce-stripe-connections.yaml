naftiko: 1.0.0-alpha2
info:
  label: TIDAL Commerce API — Stripe and Square Connections
  description: TIDAL Commerce API — Stripe and Square Connections. 7 operations. Self-contained Naftiko capability covering
    one TIDAL business surface.
  tags:
  - TIDAL
  - Music
  - stripeConnections
  - stripeDashboardLinks
  - squareConnections
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TIDAL_ACCESS_TOKEN: TIDAL_ACCESS_TOKEN
capability:
