          in: path
          type: string
          description: Stripe connection id. Use `me` for the authenticated user's resource
          required: true
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
        - name: page[cursor]
          in: query
          type: string
          description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not
            specified
          required: false
    - name: stripeDashboardLinks
      path: /stripeDashboardLinks
      operations:
      - name: getstripedashboardlinks
        method: GET
        description: Get multiple stripeDashboardLinks.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
