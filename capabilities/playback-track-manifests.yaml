    baseUri: https://openapi.tidal.com
    description: TIDAL Playback API — Track Manifests and Files business capability. Self-contained, no shared references.
    resources:
    - name: trackFiles-id
      path: /trackFiles/{id}
      operations:
      - name: gettrackfiles
        method: GET
        description: Get single trackFile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Track file id
          required: true
        - name: formats
          in: query
          type: array
          description: ''
          required: true
        - name: usage
          in: query
          type: string
          description: ''
          required: true
    - name: trackManifests-id
      path: /trackManifests/{id}
      operations:
      - name: gettrackmanifests
        method: GET
        description: Get single trackManifest.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Track manifest id
          required: true
        - name: manifestType
          in: query
          type: string
          description: ''
          required: true
        - name: formats
          in: query
          type: array
          description: ''
          required: true
        - name: uriScheme
          in: query
          type: string
          description: ''
          required: true
        - name: usage
          in: query
          type: string
          description: ''
          required: true
        - name: adaptive
          in: query
          type: boolean
          description: ''
          required: true
        - name: shareCode
          in: query
          type: string
          description: Share code that grants access to UNLISTED resources. When provided, allows non-owners to access resources
            that would otherwise be restricted.
          required: false
    - name: trackSourceFiles
      path: /trackSourceFiles
      operations:
      - name: gettracksourcefiles
        method: GET
        description: Get multiple trackSourceFiles.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
        - name: filter[id]
          in: query
          type: array
          description: Track source file id (e.g. `a0eebc99-9c0b-4ef8-bb6d-6bb9bd380a11`)
          required: false
      - name: posttracksourcefiles
        method: POST
        description: Create single trackSourceFile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: JSON:API document request body.
          required: true
    - name: trackSourceFiles-id
      path: /trackSourceFiles/{id}
      operations:
      - name: gettracksourcefiles
        method: GET
        description: Get single trackSourceFile.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Track source file id
          required: true
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
    - name: trackSourceFiles-id-relationships-owners
      path: /trackSourceFiles/{id}/relationships/owners
      operations:
      - name: gettracksourcefiles
        method: GET
        description: Get owners relationship ("to-many").
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Track source file id
          required: true
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
        - name: page[cursor]
          in: query
          type: string
          description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not
            specified
          required: false
    authentication:
      type: bearer
      value: '{{env.TIDAL_ACCESS_TOKEN}}'
      placement: header
      header: Authorization
      prefix: 'Bearer '
  exposes:
  - type: rest
    namespace: playback-track-manifests-rest
    port: 8080
    description: REST adapter for TIDAL Playback API — Track Manifests and Files. One Spectral-compliant resource per consumed
