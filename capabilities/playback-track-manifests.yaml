    resources:
    - path: /v2/trackFiles/{id}
      name: trackFiles-id
      description: REST surface for trackFiles-id.
      operations:
      - method: GET
        name: gettrackfiles
        description: Get single trackFile.
        call: playback-track-manifests.gettrackfiles
        with:
          id: rest.path.id
          formats: rest.query.formats
          usage: rest.query.usage
        outputParameters:
        - type: object
          mapping: $.
