naftiko: 1.0.0-alpha2
info:
  label: TIDAL Social API — Reactions
  description: TIDAL Social API — Reactions. 5 operations. Self-contained Naftiko capability covering one TIDAL business surface.
  tags:
  - TIDAL
  - Music
  - reactions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TIDAL_ACCESS_TOKEN: TIDAL_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: social-reactions
    baseUri: https://openapi.tidal.com
    description: TIDAL Social API — Reactions business capability. Self-contained, no shared references.
    resources:
    - name: reactions
      path: /reactions
      operations:
      - name: getreactions
        method: GET
        description: Get multiple reactions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: stats
          in: query
          type: string
          description: ''
          required: false
        - name: statsOnly
          in: query
          type: boolean
          description: ''
          required: false
        - name: viewerContext
          in: query
          type: string
          description: ''
          required: false
        - name: page[cursor]
          in: query
          type: string
          description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not
            specified
          required: false
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: ownerProfiles,
            owners'
          required: false
        - name: filter[emoji]
          in: query
          type: array
          description: Filter by emoji (e.g. `👍`)
          required: false
        - name: filter[subject.id]
          in: query
          type: array
          description: Filter by subject resource ID (e.g. `12345`)
          required: false
        - name: filter[subject.type]
          in: query
          type: array
          description: Filter by subject resource type (e.g. `albums`)
          required: false
      - name: postreactions
        method: POST
        description: Create single reaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: JSON:API document request body.
          required: true
    - name: reactions-id
      path: /reactions/{id}
      operations:
      - name: deletereactions
        method: DELETE
        description: Delete single reaction.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Reaction Id
          required: true
    - name: reactions-id-relationships-ownerProfiles
      path: /reactions/{id}/relationships/ownerProfiles
      operations:
      - name: getreactions
        method: GET
        description: Get ownerProfiles relationship ("to-many").
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Reaction Id
          required: true
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: ownerProfiles'
          required: false
        - name: page[cursor]
          in: query
          type: string
          description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not
            specified
          required: false
    - name: reactions-id-relationships-owners
      path: /reactions/{id}/relationships/owners
      operations:
      - name: getreactions
        method: GET
        description: Get owners relationship ("to-many").
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Reaction Id
          required: true
        - name: include
          in: query
          type: array
          description: 'Allows the client to customize which related resources should be returned. Available options: owners'
          required: false
        - name: page[cursor]
          in: query
          type: string
          description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not
            specified
          required: false
    authentication:
      type: bearer
      value: '{{env.TIDAL_ACCESS_TOKEN}}'
      placement: header
      header: Authorization
      prefix: 'Bearer '
  exposes:
  - type: rest
    namespace: social-reactions-rest
    port: 8080
    description: REST adapter for TIDAL Social API — Reactions. One Spectral-compliant resource per consumed operation, prefixed
      with /v2.
    resources:
    - path: /v2/reactions
      name: reactions
      description: REST surface for reactions.
      operations:
      - method: GET
        name: getreactions
        description: Get multiple reactions.
        call: social-reactions.getreactions
        with:
          stats: rest.query.stats
          statsOnly: rest.query.statsOnly
          viewerContext: rest.query.viewerContext
          page[cursor]: rest.query.page[cursor]
          include: rest.query.include
          filter[emoji]: rest.query.filter[emoji]
          filter[subject.id]: rest.query.filter[subject.id]
          filter[subject.type]: rest.query.filter[subject.type]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postreactions
        description: Create single reaction.
        call: social-reactions.postreactions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/reactions/{id}
      name: reactions-id
      description: REST surface for reactions-id.
      operations:
      - method: DELETE
        name: deletereactions
        description: Delete single reaction.
        call: social-reactions.deletereactions
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/reactions/{id}/relationships/ownerProfiles
      name: reactions-id-relationships-ownerProfiles
      description: REST surface for reactions-id-relationships-ownerProfiles.
      operations:
      - method: GET
        name: getreactions
        description: Get ownerProfiles relationship ("to-many").
        call: social-reactions.getreactions
        with:
          id: rest.path.id
          include: rest.query.include
          page[cursor]: rest.query.page[cursor]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v2/reactions/{id}/relationships/owners
      name: reactions-id-relationships-owners
      description: REST surface for reactions-id-relationships-owners.
      operations:
      - method: GET
        name: getreactions
        description: Get owners relationship ("to-many").
        call: social-reactions.getreactions
        with:
          id: rest.path.id
          include: rest.query.include
          page[cursor]: rest.query.page[cursor]
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: social-reactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for TIDAL Social API — Reactions. One tool per consumed operation.
    tools:
    - name: tidal-getreactions
      description: Get multiple reactions.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: social-reactions.getreactions
      with:
        stats: tools.stats
        statsOnly: tools.statsOnly
        viewerContext: tools.viewerContext
        page[cursor]: tools.page[cursor]
        include: tools.include
        filter[emoji]: tools.filter[emoji]
        filter[subject.id]: tools.filter[subject.id]
        filter[subject.type]: tools.filter[subject.type]
      outputParameters:
      - type: object
        mapping: $.
    - name: tidal-postreactions
      description: Create single reaction.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: social-reactions.postreactions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: tidal-deletereactions
      description: Delete single reaction.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: social-reactions.deletereactions
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: tidal-getreactions
      description: Get ownerProfiles relationship ("to-many").
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: social-reactions.getreactions
      with:
        id: tools.id
        include: tools.include
        page[cursor]: tools.page[cursor]
      outputParameters:
      - type: object
        mapping: $.
    - name: tidal-getreactions
      description: Get owners relationship ("to-many").
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: social-reactions.getreactions
      with:
        id: tools.id
        include: tools.include
        page[cursor]: tools.page[cursor]
      outputParameters:
      - type: object
        mapping: $.
