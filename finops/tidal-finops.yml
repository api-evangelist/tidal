specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: TIDAL
providerId: tidal
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - FinOps
  - Music
  - Streaming
  - Subscription
description: FOCUS-aligned FinOps definition for the TIDAL platform. TIDAL's primary billing surface is the
  consumer subscription (flat per-user monthly recurring revenue), with a secondary Commerce surface for
  direct fan purchases via Stripe and Square. TIDAL's developer API access itself is free; FinOps signals
  here reflect end-user subscriptions and creator commerce payouts.
sources:
  - https://tidal.com/pricing
  - https://developer.tidal.com/documentation/api-sdk/api-sdk-overview
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TIDAL Music AS (a Block, Inc. company)
serviceCategory: Media and Entertainment
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Purchase
    - Refund
    - Tax
    - Adjustment
  primaryUnit: user
  secondaryUnits:
    - track-purchase
    - artist-tip
metering:
  unit: user-month
  description: Per-active-subscriber per-month for tier subscriptions; per-transaction for fan purchases.
discountLanes:
  - id: student
    name: Student
    discountPercent: 55
    eligibility: SheerID-verified college students
  - id: family
    name: Family
    discountPercent: 0
    eligibility: Single subscription covering up to 6 household members
costAllocation:
  tagging:
    supported: true
    description: TIDAL ties charges to user accounts and (for purchases) to artist and product identifiers.
chargeTypes:
  - id: subscription
    name: Subscription
    cadence: Monthly
    description: Recurring tier subscription (Individual / Family / Student / DJ).
  - id: purchase
    name: Direct Fan Purchase
    cadence: Event
    description: Fan purchases of music or merchandise via the Commerce API and Stripe/Square connections.
  - id: tax
    name: Tax
    cadence: Event
    description: VAT or sales tax applied per local regulation.
payouts:
  description: Artist payouts run through Stripe Connect or Square; TIDAL's stripeConnections and stripeDashboardLinks
    endpoints expose connection state and onboarding links to verified artists.
  connectors:
    - Stripe Connect
    - Square
