      summary: Get owners relationship ("to-many").
      tags:
      - albumStatistics
      x-path-item-properties:
        required-access-tier: INTERNAL
  /albums:
    get:
      description: Retrieves multiple albums by available filters, or without if applicable.
      parameters:
      - description: Server-generated cursor value pointing a certain page of items. Optional, targets first page if not specified
        in: query
        name: page[cursor]
        required: false
        schema:
          type: string
      - description: Values prefixed with "-" are sorted descending; values without it are sorted ascending.
        in: query
        name: sort
        required: false
        schema:
          type: array
          items:
            type: string
            example: createdAt
            enum:
            - createdAt
            - -createdAt
            - title
            - -title
            default: -createdAt
            x-enum-varnames:
            - CreatedAtAsc
            - CreatedAtDesc
            - TitleAsc
            - TitleDesc
      - description: ISO 3166-1 alpha-2 country code
        example: US
        in: query
        name: countryCode
        required: false
        schema:
          type: string
      - description: 'Allows the client to customize which related resources should be returned. Available options: albumStatistics,
          artists, coverArt, genres, items, owners, priceConfig, providers, replacement, shares, similarAlbums, suggestedCoverArts,
          usageRules'
        example: albumStatistics
        in: query
        name: include
        required: false
        schema:
          type: array
          items:
            type: string
            example: albumStatistics
      - description: 'List of barcode IDs (EAN-13 or UPC-A). NOTE: Supplying more than one barcode ID will currently only
          return one album per barcode ID. (e.g. `196589525444`)'
        in: query
        name: filter[barcodeId]
        required: false
        schema:
          type: array
          items:
            type: string
      - description: Album id (e.g. `251380836`)
        in: query
        name: filter[id]
        required: false
        schema:
          type: array
          items:
            type: string
      - description: User id. Use `me` for the authenticated user
        in: query
        name: filter[owners.id]
        required: false
        schema:
          type: array
          items:
            type: string
      - description: Share code that grants access to UNLISTED resources. When provided, allows non-owners to access resources
          that would otherwise be restricted.
        in: query
        name: shareCode
        required: false
        schema:
          type: string
          example: xyz
      responses:
        '200':
          content:
            application/vnd.api+json:
              schema:
                $ref: '#/components/schemas/Albums_Multi_Resource_Data_Document'
          description: Successful response
        '400':
          $ref: '#/components/responses/Default400Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '405':
          $ref: '#/components/responses/Default405Response'
        '406':
          $ref: '#/components/responses/Default406Response'
        '415':
          $ref: '#/components/responses/Default415Response'
        '429':
          $ref: '#/components/responses/Default429Response'
        '500':
          $ref: '#/components/responses/Default500Response'
        '503':
          $ref: '#/components/responses/Default503Response'
      security:
      - Client_Credentials: []
      - Authorization_Code_PKCE:
        - r_usr
      summary: Get multiple albums.
      tags:
      - albums
      x-path-item-properties:
        required-access-tier: THIRD_PARTY
    post:
      description: Creates a new album.
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
